<div class="admin-layout">
  <app-sidebar
    [isOpen]="sidebarOpen"
    [isCollapsed]="sidebarCollapsed"
    (closeSidebar)="onSidebarClose()"
    (toggleCollapse)="onCollapseSidebar()"
  ></app-sidebar>

  <div class="admin-main">
    <div class="admin-header">
      <button class="sidebar-toggle" (click)="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <div class="admin-title">
        <h1>Manage Payment QR</h1>
      </div>
    </div>

    <div class="admin-container">
      <div class="section">
        <h2>Existing QR Codes</h2>
        <div class="row">
          <div class="col-md-6 mb-4">
            <h4>Maya</h4>
            <div *ngIf="currentMayaQr; else noMaya">
              <img [src]="currentMayaQr" alt="Maya QR" class="qr-preview" />
              <div class="mt-2">
                <button class="btn btn-danger btn-sm" (click)="clearQr('maya')">Remove</button>
              </div>
            </div>
            <ng-template #noMaya><p class="text-muted">No Maya QR uploaded.</p></ng-template>
          </div>
          <div class="col-md-6 mb-4">
            <h4>GCash</h4>
            <div *ngIf="currentGcashQr; else noGcash">
              <img [src]="currentGcashQr" alt="GCash QR" class="qr-preview" />
              <div class="mt-2">
                <button class="btn btn-danger btn-sm" (click)="clearQr('gcash')">Remove</button>
              </div>
            </div>
            <ng-template #noGcash><p class="text-muted">No GCash QR uploaded.</p></ng-template>
          </div>
        </div>
      </div>

      <div class="section">
        <h2>Upload/Replace QR</h2>
        <div class="form-group mb-3">
          <label for="methodSelect">Select Method</label>
          <select id="methodSelect" class="form-select" [(ngModel)]="editingMethod">
            <option [ngValue]="null">-- choose --</option>
            <option value="maya">Maya</option>
            <option value="gcash">GCash</option>
          </select>
        </div>
        <div *ngIf="editingMethod">
          <div class="form-group">
            <label for="qrFile">Select image file</label>
            <input type="file" id="qrFile" class="form-control" (change)="onFileChange($event)" accept="image/*" />
          </div>
          <div *ngIf="newQrPreview" class="mt-3">
            <h3>Preview</h3>
            <img [src]="newQrPreview" class="qr-preview" alt="New QR preview" />
          </div>
          <button class="btn btn-primary mt-3" (click)="saveQr()" [disabled]="!newQrPreview">
            Save {{ editingMethod | titlecase }} QR Code
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
